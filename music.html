<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>music — arya somu</title>
  <meta name="description" content="what i'm listening to.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0b0b0b;
      color: #e8e8e8;
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 32px 100px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 64px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid #2e2e2e;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.02em;
      transition: color 0.12s, border-color 0.12s;
    }

    .logo:hover { color: #e8e8e8; border-color: #555; }

    nav { display: flex; align-items: center; font-size: 17px; }
    nav a { color: #e8e8e8; text-decoration: none; transition: color 0.12s; }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; }
    nav .sep { color: #333; margin: 0 6px; user-select: none; }

    .heading {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(34px, 5vw, 44px);
      color: #fff;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    /* ── Now playing ── */

    .now-playing {
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 48px;
      background: #0f0f0f;
    }

    .np-status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 14px;
    }

    .np-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .np-dot.live {
      background: #4caf7d;
      box-shadow: 0 0 6px #4caf7d88;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .np-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      font-weight: 400;
      transition: color 0.3s;
    }

    .np-label.live { color: #4caf7d; }

    .np-track {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .np-art {
      width: 44px;
      height: 44px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      background: #1a1a1a;
    }

    .np-art.hidden { display: none; }

    .np-art-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 3px;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    .np-info {
      flex: 1;
      min-width: 0;
    }

    .np-name {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .np-artist {
      display: block;
      font-size: 13px;
      font-weight: 300;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .np-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .np-bars.live { opacity: 1; }

    .np-bars span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: #4caf7d;
      transform-origin: bottom;
    }

    .np-bars span:nth-child(1) { height: 8px;  animation: bar 0.9s ease-in-out infinite alternate; animation-delay: 0s; }
    .np-bars span:nth-child(2) { height: 14px; animation: bar 0.9s ease-in-out infinite alternate; animation-delay: 0.2s; }
    .np-bars span:nth-child(3) { height: 10px; animation: bar 0.9s ease-in-out infinite alternate; animation-delay: 0.1s; }
    .np-bars span:nth-child(4) { height: 6px;  animation: bar 0.9s ease-in-out infinite alternate; animation-delay: 0.3s; }

    @keyframes bar {
      from { transform: scaleY(0.25); }
      to   { transform: scaleY(1); }
    }

    .np-bars:not(.live) span { animation: none; }

    /* ── Track lists ── */

    .section-label {
      font-size: 17px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .track-list { list-style: none; margin-bottom: 48px; }

    .track-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid #161616;
    }

    .track-row:first-child { border-top: 1px solid #161616; }

    .track-left { flex: 1; min-width: 0; }

    .track-name {
      font-size: 17px;
      font-weight: 500;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 14px;
      font-weight: 300;
      color: #555;
    }

    .track-context {
      font-size: 13px;
      color: #3a3a3a;
      text-align: right;
      flex-shrink: 0;
      font-style: italic;
    }

    /* ── Note ── */

    .body-text {
      font-size: 17px;
      color: #c8c8c8;
      line-height: 1.8;
      font-weight: 300;
    }

    .body-text p { margin-bottom: 14px; }
    .body-text p:last-child { margin-bottom: 0; }

    /* ── Setup note ── */

    .section-label {
      font-size: 17px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .track-list { list-style: none; margin-bottom: 48px; }

    .track-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid #161616;
    }

    .track-row:first-child { border-top: 1px solid #161616; }

    .track-left { flex: 1; min-width: 0; }

    .track-name {
      font-size: 15px;
      font-weight: 500;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 13px;
      font-weight: 300;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-time {
      font-size: 12px;
      color: #333;
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .setup-note {
      margin-top: 48px;
      padding: 14px 18px;
      border: 1px dashed #222;
      border-radius: 4px;
      font-size: 13px;
      color: #444;
      line-height: 1.7;
    }

    .setup-note code {
      font-family: monospace;
      color: #666;
      background: #161616;
      padding: 1px 5px;
      border-radius: 3px;
    }

    @media (max-width: 480px) {
      .page { padding: 24px 20px 60px; }
      .track-context { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">

    <div class="topbar">
      <a class="logo" href="/">a</a>
      <nav>
        <a href="/">index</a>
        <span class="sep">•</span>
        <a href="research.html">research</a>
        <span class="sep">•</span>
        <a href="music.html" class="active">music</a>
      </nav>
    </div>

    <h1 class="heading">music</h1>

    <div class="now-playing">
      <div class="np-status">
        <span class="np-dot" id="np-dot"></span>
        <span class="np-label" id="np-label">connecting...</span>
      </div>
      <div class="np-track">
        <img class="np-art hidden" id="np-art" src="" alt="">
        <div class="np-art-placeholder" id="np-placeholder"></div>
        <div class="np-info">
          <span class="np-name" id="np-name">—</span>
          <span class="np-artist" id="np-artist">—</span>
        </div>
        <div class="np-bars" id="np-bars">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="setup-note" id="setup-note" style="display:none;">
      to enable live now playing: (1) create a free account at <code>last.fm</code> and connect it to spotify under settings, (2) get a free api key at <code>last.fm/api</code>, then replace <code>LASTFM_USER</code> and <code>LASTFM_KEY</code> at the top of this file's script tag.
    </div>

    <p class="section-label" id="recent-label" style="display:none;">recently played</p>
    <ul class="track-list" id="recent-list"></ul>

  </main>

  <script>
    const LASTFM_USER = 'aiibet';
    const LASTFM_KEY  = '34ff6d331e356e7da4c6d64f3019d977';

    const dot         = document.getElementById('np-dot');
    const label       = document.getElementById('np-label');
    const art         = document.getElementById('np-art');
    const placeholder = document.getElementById('np-placeholder');
    const name        = document.getElementById('np-name');
    const artist      = document.getElementById('np-artist');
    const bars        = document.getElementById('np-bars');
    const setupNote   = document.getElementById('setup-note');
    const recentLabel = document.getElementById('recent-label');
    const recentList  = document.getElementById('recent-list');

    const isConfigured = LASTFM_USER !== 'LASTFM_USER' && LASTFM_KEY !== 'LASTFM_KEY';

    function timeAgo(unixTimestamp) {
      const diff = Math.floor(Date.now() / 1000) - parseInt(unixTimestamp);
      if (diff < 60)             return 'just now';
      if (diff < 3600)           return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400)          return `${Math.floor(diff / 3600)}h ago`;
      if (diff < 86400 * 7)      return `${Math.floor(diff / 86400)}d ago`;
      return `${Math.floor(diff / 604800)}w ago`;
    }

    function setLive(track) {
      dot.classList.add('live');
      label.classList.add('live');
      label.textContent = 'now playing';
      bars.classList.add('live');
      name.textContent   = track.name;
      artist.textContent = track.artist['#text'];
      const img = track.image?.find(i => i.size === 'medium')?.['#text'];
      if (img) {
        art.src = img;
        art.classList.remove('hidden');
        placeholder.style.display = 'none';
      }
    }

    function setIdle(track) {
      dot.classList.remove('live');
      label.classList.remove('live');
      label.textContent = 'last played';
      bars.classList.remove('live');
      name.textContent   = track ? track.name : '—';
      artist.textContent = track ? track.artist['#text'] : '—';
      const img = track?.image?.find(i => i.size === 'medium')?.['#text'];
      if (img) {
        art.src = img;
        art.classList.remove('hidden');
        placeholder.style.display = 'none';
      }
    }

    function setError() {
      label.textContent  = 'not available';
      name.textContent   = '—';
      artist.textContent = '—';
    }

    function renderRecent(tracks) {
      recentList.innerHTML = '';
      tracks.forEach(t => {
        const li = document.createElement('li');
        li.className = 'track-row';
        li.innerHTML = `
          <div class="track-left">
            <p class="track-name">${t.name}</p>
            <p class="track-artist">${t.artist['#text']}</p>
          </div>
          <span class="track-time">${t.date ? timeAgo(t.date.uts) : ''}</span>
        `;
        recentList.appendChild(li);
      });
      recentLabel.style.display = 'block';
    }

    async function fetchNowPlaying() {
      if (!isConfigured) {
        label.textContent = 'not connected';
        setupNote.style.display = 'block';
        return;
      }
      try {
        const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USER}&api_key=${LASTFM_KEY}&format=json&limit=9`;
        const res  = await fetch(url);
        const data = await res.json();
        const tracks = data?.recenttracks?.track;
        if (!tracks) { setError(); return; }

        const list      = Array.isArray(tracks) ? tracks : [tracks];
        const isPlaying = list[0]?.['@attr']?.nowplaying === 'true';

        isPlaying ? setLive(list[0]) : setIdle(list[0]);

        const recent = isPlaying ? list.slice(1, 9) : list.slice(1, 9);
        if (recent.length) renderRecent(recent);
      } catch {
        setError();
      }
    }

    fetchNowPlaying();
    setInterval(fetchNowPlaying, 30000);
  </script>
</body>
</html>
