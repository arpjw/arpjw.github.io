<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music</title>
  <meta name="description" content="What I've been listening to.">
  <meta property="og:title" content="music — Arya Somu">
  <meta property="og:description" content="What I've been listening to.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdfcfa;
      --bg-soft: #f5efe2;
      --stripe: #f3ede0;
      --text: #1a1a1a;
      --text-soft: #2a2a2a;
      --text-muted: #6e6a60;
      --text-faint: #9a9486;
      --link: #1f5fd8;
      --link-hover: #0f3fa8;
      --accent: #d96e23;
      --rule: #e5dfd3;
      --sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.65;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 36px 24px 96px;
    }

    /* NAV */
    nav.site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .logo {
      width: 18px; height: 18px;
      background: var(--accent);
      display: inline-block;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .logo:hover { transform: scale(1.2); }

    nav.site-nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }
    nav.site-nav a {
      color: var(--text-soft);
      text-decoration: none;
      font-size: 15px;
      transition: color 0.15s ease;
    }
    nav.site-nav a:hover { color: var(--link); }
    nav.site-nav a[aria-current="page"] {
      color: var(--text);
      font-weight: 600;
    }

    /* PAGE INTRO */
    .page-intro {
      color: var(--text-muted);
      font-size: 15.5px;
      margin-bottom: 36px;
      max-width: 480px;
    }
    .page-intro a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
    }
    .page-intro a:hover { color: var(--link-hover); }

    /* SECTION LABELS */
    .section-label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 18px;
    }

    /* NOW PLAYING */
    .now-playing {
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 48px;
      background: var(--bg-soft);
    }
    .np-status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 14px;
    }
    .np-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .np-dot.live {
      background: var(--accent);
      box-shadow: 0 0 6px rgba(217, 110, 35, 0.5);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .np-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
      transition: color 0.3s;
    }
    .np-label.live { color: var(--accent); }

    .np-track { display: flex; align-items: center; gap: 14px; }

    .np-art {
      width: 44px; height: 44px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--stripe);
    }
    .np-art.hidden { display: none; }
    .np-art-placeholder {
      width: 44px; height: 44px;
      border-radius: 3px;
      background: var(--stripe);
      flex-shrink: 0;
    }

    .np-info { flex: 1; min-width: 0; }
    .np-name {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .np-artist {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .np-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .np-bars.live { opacity: 1; }
    .np-bars span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      transform-origin: bottom;
    }
    .np-bars span:nth-child(1) { height: 8px;  animation: bar 0.9s ease-in-out infinite alternate; }
    .np-bars span:nth-child(2) { height: 14px; animation: bar 0.9s ease-in-out infinite alternate; animation-delay: 0.2s; }
    .np-bars span:nth-child(3) { height: 10px; animation: bar 0.9s ease-in-out infinite alternate; animation-delay: 0.1s; }
    .np-bars span:nth-child(4) { height: 6px;  animation: bar 0.9s ease-in-out infinite alternate; animation-delay: 0.3s; }
    @keyframes bar { from { transform: scaleY(0.25); } to { transform: scaleY(1); } }
    .np-bars:not(.live) span { animation: none; }

    /* ALBUM MOSAIC */
    .album-section { margin-bottom: 56px; }
    .album-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .album-tile {
      aspect-ratio: 1;
      border-radius: 3px;
      overflow: hidden;
      position: relative;
      background: var(--stripe);
    }
    .album-tile img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .album-tile:hover img { transform: scale(1.06); }
    .album-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(transparent 30%, rgba(0,0,0,0.85) 100%);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 9px;
    }
    .album-tile:hover .album-overlay { opacity: 1; }
    .album-tile-name {
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .album-tile-artist {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-tile-plays {
      font-size: 9px;
      color: rgba(255, 200, 150, 0.85);
      margin-top: 2px;
      font-weight: 500;
    }
    .album-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--stripe) 0%, var(--bg-soft) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .album-placeholder-inner {
      width: 30%; height: 30%;
      border: 1px solid var(--rule);
      border-radius: 2px;
    }

    /* LISTENING CLOCK */
    .clock-section { margin-bottom: 56px; }
    .clock-wrap {
      display: flex;
      align-items: center;
      gap: 40px;
    }
    .clock-svg-container { flex-shrink: 0; }
    #clock-svg { display: block; overflow: visible; }

    .clock-stats {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .clock-stat-value {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .clock-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 500;
    }

    /* RECENTLY PLAYED */
    .recent-section { margin-bottom: 32px; }
    .track-list { list-style: none; }
    .track-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--rule);
    }
    .track-row:first-child { border-top: 1px solid var(--rule); }
    .track-art {
      width: 32px; height: 32px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--stripe);
    }
    .track-art.hidden { display: none; }
    .track-art-placeholder {
      width: 32px; height: 32px;
      border-radius: 2px;
      background: var(--stripe);
      flex-shrink: 0;
    }
    .track-left { flex: 1; min-width: 0; }
    .track-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-time {
      font-size: 12px;
      color: var(--text-faint);
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* FOOTER */
    .doc-footer {
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      font-size: 12px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .doc-footer .sep { color: var(--rule); }
    #sf-time { font-variant-numeric: tabular-nums; }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, var(--stripe) 25%, var(--bg-soft) 50%, var(--stripe) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 3px;
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    ::selection { background: var(--accent); color: var(--bg); }

    .site-footer {
      margin-top: 56px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .container { padding: 28px 20px 64px; }
      nav.site-nav ul { gap: 16px; }
      nav.site-nav a { font-size: 14px; }
      .album-grid { grid-template-columns: repeat(3, 1fr); }
      .clock-wrap { flex-direction: column; align-items: flex-start; gap: 24px; }
      .clock-stats { flex-direction: row; gap: 28px; width: 100%; }
      .clock-stat-value { font-size: 20px; }
    }
  </style>
</head>

  <script>
    const LASTFM_USER = 'aiibet';
    const LASTFM_KEY  = '34ff6d331e356e7da4c6d64f3019d977';
    const BASE        = 'https://ws.audioscrobbler.com/2.0/';

    /* NOW PLAYING */
    const dot         = document.getElementById('np-dot');
    const label       = document.getElementById('np-label');
    const art         = document.getElementById('np-art');
    const placeholder = document.getElementById('np-placeholder');
    const npName      = document.getElementById('np-name');
    const npArtist    = document.getElementById('np-artist');
    const bars        = document.getElementById('np-bars');

    function setLive(track) {
      dot.classList.add('live');
      label.classList.add('live');
      label.textContent = 'now playing';
      bars.classList.add('live');
      npName.textContent   = track.name;
      npArtist.textContent = track.artist['#text'];
      const img = track.image?.find(i => i.size === 'medium')?.['#text'];
      if (img) {
        art.src = img;
        art.classList.remove('hidden');
        placeholder.style.display = 'none';
      }
    }

    function setIdle(track) {
      dot.classList.remove('live');
      label.classList.remove('live');
      label.textContent = 'last played';
      bars.classList.remove('live');
      npName.textContent   = track ? track.name : '—';
      npArtist.textContent = track ? track.artist['#text'] : '—';
      const img = track?.image?.find(i => i.size === 'medium')?.['#text'];
      if (img) {
        art.src = img;
        art.classList.remove('hidden');
        placeholder.style.display = 'none';
      }
    }

    async function fetchNowPlaying() {
      try {
        const res  = await fetch(`${BASE}?method=user.getrecenttracks&user=${LASTFM_USER}&api_key=${LASTFM_KEY}&format=json&limit=9`);
        const data = await res.json();
        const tracks = data?.recenttracks?.track;
        if (!tracks) return;
        const list = Array.isArray(tracks) ? tracks : [tracks];
        list[0]?.['@attr']?.nowplaying === 'true' ? setLive(list[0]) : setIdle(list[0]);
        const recent = list.slice(1, 9);
        if (recent.length) renderRecent(recent);
      } catch {}
    }

    fetchNowPlaying();
    setInterval(fetchNowPlaying, 30000);

    /* ALBUM MOSAIC */
    async function fetchAlbums() {
      try {
        const res  = await fetch(`${BASE}?method=user.gettopalbums&user=${LASTFM_USER}&api_key=${LASTFM_KEY}&format=json&limit=12&period=1month`);
        const data = await res.json();
        const albums = data?.topalbums?.album;
        if (!albums || !albums.length) return;
        renderAlbums(albums);
      } catch {}
    }

    function renderAlbums(albums) {
      const grid = document.getElementById('album-grid');
      grid.innerHTML = '';
      albums.forEach(album => {
        const imgUrl = album.image?.find(i => i.size === 'extralarge')?.['#text']
                    || album.image?.find(i => i.size === 'large')?.['#text']
                    || '';
        const plays  = parseInt(album.playcount) || 0;
        const tile   = document.createElement('div');
        tile.className = 'album-tile';

        if (imgUrl && !imgUrl.includes('2a96cbd8b46e442fc41c2b86b821562f')) {
          tile.innerHTML = `
            <img src="${imgUrl}" alt="${album.name}" loading="lazy">
            <div class="album-overlay">
              <div class="album-tile-name">${album.name}</div>
              <div class="album-tile-artist">${album.artist.name}</div>
              <div class="album-tile-plays">${plays} plays</div>
            </div>
          `;
        } else {
          tile.innerHTML = `
            <div class="album-placeholder">
              <div class="album-placeholder-inner"></div>
            </div>
            <div class="album-overlay">
              <div class="album-tile-name">${album.name}</div>
              <div class="album-tile-artist">${album.artist.name}</div>
              <div class="album-tile-plays">${plays} plays</div>
            </div>
          `;
        }
        grid.appendChild(tile);
      });
    }

    fetchAlbums();

    /* LISTENING CLOCK */
    async function fetchClock() {
      try {
        const res  = await fetch(`${BASE}?method=user.getrecenttracks&user=${LASTFM_USER}&api_key=${LASTFM_KEY}&format=json&limit=200`);
        const data = await res.json();
        const tracks = data?.recenttracks?.track;
        if (!tracks) return;
        const list = Array.isArray(tracks) ? tracks : [tracks];

        const hourCounts = new Array(24).fill(0);
        let totalWithDate = 0;
        let oldest = null, newest = null;

        list.forEach(t => {
          if (!t.date?.uts) return;
          const d = new Date(parseInt(t.date.uts) * 1000);
          hourCounts[d.getHours()]++;
          totalWithDate++;
          if (!oldest || d < oldest) oldest = d;
          if (!newest || d > newest) newest = d;
        });

        if (totalWithDate === 0) return;

        drawClock(hourCounts);

        const peakHour = hourCounts.indexOf(Math.max(...hourCounts));
        const fmtHour  = h => {
          if (h === 0)  return '12am';
          if (h === 12) return '12pm';
          return h < 12 ? `${h}am` : `${h - 12}pm`;
        };

        document.getElementById('stat-peak').textContent  = fmtHour(peakHour);
        document.getElementById('stat-total').textContent = totalWithDate;
        document.getElementById('stat-period').textContent = oldest
          ? `${Math.round((newest - oldest) / 86400000)}d`
          : '—';
      } catch {}
    }

    function drawClock(hourCounts) {
      const svg    = document.getElementById('clock-svg');
      const cx = 100, cy = 100;
      const innerR = 28;
      const maxBar = 64;
      const maxCount = Math.max(...hourCounts, 1);
      const ns = 'http://www.w3.org/2000/svg';

      svg.innerHTML = '';

      /* inner ring */
      const ring = document.createElementNS(ns, 'circle');
      ring.setAttribute('cx', cx); ring.setAttribute('cy', cy);
      ring.setAttribute('r', innerR - 4);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#e5dfd3');
      ring.setAttribute('stroke-width', '1');
      svg.appendChild(ring);

      /* hour bars */
      for (let h = 0; h < 24; h++) {
        const angle  = (h / 24) * 2 * Math.PI - Math.PI / 2;
        const count  = hourCounts[h];
        const frac   = count / maxCount;
        const barLen = frac * maxBar;

        if (barLen < 1) {
          /* stub for empty hours */
          const stub = document.createElementNS(ns, 'line');
          const x1 = cx + innerR * Math.cos(angle);
          const y1 = cy + innerR * Math.sin(angle);
          const x2 = cx + (innerR + 3) * Math.cos(angle);
          const y2 = cy + (innerR + 3) * Math.sin(angle);
          stub.setAttribute('x1', x1); stub.setAttribute('y1', y1);
          stub.setAttribute('x2', x2); stub.setAttribute('y2', y2);
          stub.setAttribute('stroke', 'rgba(217, 110, 35, 0.18)');
          stub.setAttribute('stroke-width', '3');
          stub.setAttribute('stroke-linecap', 'round');
          svg.appendChild(stub);
          continue;
        }

        const x1 = cx + innerR * Math.cos(angle);
        const y1 = cy + innerR * Math.sin(angle);
        const x2 = cx + (innerR + barLen) * Math.cos(angle);
        const y2 = cy + (innerR + barLen) * Math.sin(angle);

        const alpha = (0.28 + frac * 0.72).toFixed(2);

        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', `rgba(217, 110, 35, ${alpha})`);
        line.setAttribute('stroke-width', '4');
        line.setAttribute('stroke-linecap', 'round');
        svg.appendChild(line);
      }

      /* cardinal labels: 12a, 6a, 12p, 6p */
      const cardinals = [
        { h: 0,  label: '12a', dx:  0,  dy: -7 },
        { h: 6,  label: '6a',  dx:  9,  dy:  0 },
        { h: 12, label: '12p', dx:  0,  dy: 10 },
        { h: 18, label: '6p',  dx: -9,  dy:  0 },
      ];

      const labelR = innerR + maxBar + 12;
      cardinals.forEach(({ h, label: lbl, dx, dy }) => {
        const angle = (h / 24) * 2 * Math.PI - Math.PI / 2;
        const lx    = cx + labelR * Math.cos(angle) + dx;
        const ly    = cy + labelR * Math.sin(angle) + dy;
        const t     = document.createElementNS(ns, 'text');
        t.setAttribute('x', lx); t.setAttribute('y', ly);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('dominant-baseline', 'middle');
        t.setAttribute('fill', '#9a9486');
        t.setAttribute('font-size', '9');
        t.setAttribute('font-family', 'Geist, sans-serif');
        t.setAttribute('letter-spacing', '0.08em');
        t.textContent = lbl;
        svg.appendChild(t);
      });

      /* center dot */
      const cdot = document.createElementNS(ns, 'circle');
      cdot.setAttribute('cx', cx); cdot.setAttribute('cy', cy);
      cdot.setAttribute('r', '3');
      cdot.setAttribute('fill', '#6e6a60');
      svg.appendChild(cdot);
    }

    fetchClock();

    /* RECENTLY PLAYED */
    function timeAgo(uts) {
      const diff = Math.floor(Date.now() / 1000) - parseInt(uts);
      if (diff < 60)        return 'just now';
      if (diff < 3600)      return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400)     return `${Math.floor(diff / 3600)}h ago`;
      if (diff < 86400 * 7) return `${Math.floor(diff / 86400)}d ago`;
      return `${Math.floor(diff / 604800)}w ago`;
    }

    function renderRecent(tracks) {
      const recentList  = document.getElementById('recent-list');
      const recentLabel = document.getElementById('recent-label');
      recentList.innerHTML = '';
      tracks.forEach(t => {
        const imgUrl = t.image?.find(i => i.size === 'small')?.['#text'] || '';
        const hasImg = imgUrl && !imgUrl.includes('2a96cbd8b46e442fc41c2b86b821562f');
        const li = document.createElement('li');
        li.className = 'track-row';
        li.innerHTML = `
          ${hasImg
            ? `<img class="track-art" src="${imgUrl}" alt="">`
            : `<div class="track-art-placeholder"></div>`
          }
          <div class="track-left">
            <p class="track-name">${t.name}</p>
            <p class="track-artist">${t.artist['#text']}</p>
          </div>
          <span class="track-time">${t.date ? timeAgo(t.date.uts) : ''}</span>
        `;
        recentList.appendChild(li);
      });
      recentLabel.style.display = 'block';
    }

    /* SF CLOCK */
    function tick() {
      const sf = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
      let h = sf.getHours(), m = sf.getMinutes(), s = sf.getSeconds();
      const ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('sf-time').textContent = `${pad(h)}:${pad(m)}:${pad(s)} ${ampm}`;
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
